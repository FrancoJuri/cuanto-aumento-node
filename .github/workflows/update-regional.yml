name: Update Regional Prices

on:
  schedule:
    # Runs at 04:00 and 16:00 UTC (2x/day, offset from update-prices)
    - cron: '0 4,16 * * *'
  workflow_dispatch:
    inputs:
      store:
        description: 'Supermarket to update (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - disco
          - jumbo
          - vea
          - carrefour
          - dia
          - masonline

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        store: ${{ (github.event_name == 'workflow_dispatch' && inputs.store != 'all') && fromJson(format('["{0}"]', inputs.store)) || fromJson('["disco","jumbo","vea","carrefour","dia","masonline"]') }}
      max-parallel: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update regional prices for ${{ matrix.store }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/scrape-regional.js ${{ matrix.store }}
